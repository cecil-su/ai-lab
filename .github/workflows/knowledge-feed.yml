name: Knowledge Feed

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source name (leave empty for all)"
        required: false
        type: string

concurrency:
  group: knowledge-feed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build knowledge-feed
        run: pnpm -F knowledge-feed build

      - name: Run knowledge-feed
        run: |
          node tools/knowledge-feed/dist/index.js \
            ${{ inputs.source && format('--source {0}', inputs.source) || '' }}
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/knowledge/
          if git diff --cached --quiet; then
            echo "No new content"
          else
            git commit -m "chore: update knowledge feed $(date -u +%Y-%m-%d)"
            git push
          fi
